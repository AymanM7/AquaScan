services:
  db:
    image: postgis/postgis:15-3.4
    container_name: rainuse-postgres
    environment:
      POSTGRES_USER: rainuse
      POSTGRES_PASSWORD: rainuse_dev
      POSTGRES_DB: rainuse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rainuse -d rainuse"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rainuse-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
